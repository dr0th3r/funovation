<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sous-Chef AI</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fdfcfb; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; border: 1px solid #f1f1f1; }
        h1 { color: #f97316; margin-bottom: 10px; font-size: 28px; }
        .status { margin-bottom: 30px; font-size: 14px; color: #666; font-weight: 500; }
        button { padding: 16px 32px; font-size: 18px; font-weight: bold; border: none; border-radius: 100px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.2); }
        .btn-start { background: #f97316; color: white; }
        .btn-start:hover { background: #ea580c; transform: scale(1.02); }
        .btn-stop { background: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .btn-stop:hover { background: #dc2626; transform: scale(1.02); }
        .tip { margin-top: 25px; font-size: 12px; color: #999; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sous-Chef AI</h1>
        <div id="status" class="status">Disconnected</div>
        <button id="btn" class="btn-start">Start Assistant</button>
        <p class="tip">Instructions: Just talk to initiate Cooking tips! You can interrupt the AI anytime by speaking.</p>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const statusEl = document.getElementById('status');
        let pc, dc, audioEl;
        const handledCallIds = new Set();
        const activeTimers = new Set();

        function parseTimerArgs(args = {}) {
            const reminderText = String(args.reminder_text ?? '').trim();
            const delaySeconds = Number(args.delay_seconds);

            if (!reminderText) {
                return { ok: false, error: 'reminder_text must be provided' };
            }

            if (!Number.isInteger(delaySeconds) || delaySeconds < 5 || delaySeconds > 7200) {
                return { ok: false, error: 'delay_seconds must be an integer between 5 and 7200' };
            }

            return {
                ok: true,
                reminderText,
                delaySeconds,
                fireAtIso: new Date(Date.now() + delaySeconds * 1000).toISOString()
            };
        }

        function scheduleReminder(reminderText, delaySeconds) {
            const timerId = setTimeout(() => {
                activeTimers.delete(timerId);
                if (!dc || dc.readyState !== 'open') {
                    return;
                }

                dc.send(JSON.stringify({
                    type: 'response.create',
                    response: {
                        instructions: `Timer finished. Briefly remind the user now: ${reminderText}`
                    }
                }));
            }, delaySeconds * 1000);

            activeTimers.add(timerId);
            return timerId;
        }

        async function handleFunctionCall(name, callId, argsText) {
            if (!dc || dc.readyState !== 'open' || !callId || handledCallIds.has(callId)) {
                return;
            }

            handledCallIds.add(callId);

            let args = {};
            try {
                args = argsText ? JSON.parse(argsText) : {};
            } catch {
                args = {};
            }

            let output;
            if (name === 'set_cooking_timer') {
                const parsed = parseTimerArgs(args);
                if (parsed.ok) {
                    scheduleReminder(parsed.reminderText, parsed.delaySeconds);
                    output = {
                        scheduled: true,
                        reminder_text: parsed.reminderText,
                        delay_seconds: parsed.delaySeconds,
                        fire_at: parsed.fireAtIso
                    };
                } else {
                    output = {
                        scheduled: false,
                        error: parsed.error
                    };
                }
            } else {
                output = {
                    scheduled: false,
                    error: `Unknown tool: ${name}`
                };
            }

            dc.send(JSON.stringify({
                type: 'conversation.item.create',
                item: {
                    type: 'function_call_output',
                    call_id: callId,
                    output: JSON.stringify(output)
                }
            }));

            dc.send(JSON.stringify({ type: 'response.create' }));
        }

        async function init() {
            try {
                statusEl.textContent = 'Connecting...';
                
                // 1. Get ephemeral token
                const res = await fetch('/session');
                const data = await res.json();
                const EPHEMERAL_KEY = data.client_secret.value;

                // 2. Setup PeerConnection
                pc = new RTCPeerConnection();

                // Handle AI Audio
                audioEl = document.createElement('audio');
                audioEl.autoplay = true;
                pc.ontrack = e => audioEl.srcObject = e.streams[0];

                // 3. Add Microphone
                const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc.addTrack(ms.getTracks()[0]);

                // 4. Events Channel
                dc = pc.createDataChannel('oai-events');
                dc.onopen = () => {
                    const sessionUpdate = {
                        type: 'session.update',
                        session: {
                            modalities: ['text', 'audio'],
                            turn_detection: { type: 'server_vad' },
                            tools: [
                                {
                                    type: 'function',
                                    name: 'set_cooking_timer',
                                    description: 'Schedules a cooking reminder after a short delay (for rice, onions, pasta, etc.).',
                                    parameters: {
                                        type: 'object',
                                        properties: {
                                            reminder_text: { type: 'string' },
                                            delay_seconds: { type: 'integer', minimum: 5, maximum: 7200 }
                                        },
                                        required: ['reminder_text', 'delay_seconds'],
                                        additionalProperties: false
                                    }
                                }
                            ],
                            tool_choice: 'auto'
                        }
                    };
                    dc.send(JSON.stringify(sessionUpdate));
                    statusEl.textContent = 'Connected! Listening...';
                    btn.textContent = 'Stop Assistant';
                    btn.className = 'btn-stop';
                };

                dc.onmessage = async (event) => {
                    try {
                        const msg = JSON.parse(event.data);

                        if (msg.type === 'response.function_call_arguments.done') {
                            await handleFunctionCall(msg.name, msg.call_id, msg.arguments);
                        }

                        if (msg.type === 'response.output_item.done' && msg.item?.type === 'function_call') {
                            await handleFunctionCall(msg.item.name, msg.item.call_id, msg.item.arguments ?? '{}');
                        }
                    } catch (error) {
                        console.error('Event handling error:', error);
                    }
                };

                // 5. Connect via SDP
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const sdpRes = await fetch('https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17', {
                    method: 'POST',
                    body: offer.sdp,
                    headers: { 'Authorization': `Bearer ${EPHEMERAL_KEY}`, 'Content-Type': 'application/sdp' }
                });

                const answer = { type: 'answer', sdp: await sdpRes.text() };
                await pc.setRemoteDescription(answer);

            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Error: ' + err.message;
            }
        }

        function stop() {
            if (pc) pc.close();
            activeTimers.forEach(clearTimeout);
            activeTimers.clear();
            handledCallIds.clear();
            statusEl.textContent = 'Disconnected';
            btn.textContent = 'Start Assistant';
            btn.className = 'btn-start';
        }

        btn.onclick = () => btn.className === 'btn-start' ? init() : stop();
    </script>
</body>
</html>
